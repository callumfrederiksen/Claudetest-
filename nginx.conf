server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # App Platform routes /api to the backend service at the ingress level
    # so nginx only needs to serve the React SPA here
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
